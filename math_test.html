<!DOCTYPE html>
<html>
  <head>
    <title>Online Maths Test</title>
  </head>
  <body>
    <!--Start of the Math Test-->
    <h1>Online Math Test</h1>
    <form>
      <label for="name">Student Name:</label>
      <input type="text" id="name" name="name">
      <br><br>

      <h3>1. what is 8 + 5?</h3>
      <input type="radio" id="q1a" name="question1" value="10">
      <label for="q1a">10</label><br>

      <input type="radio" id="q1b" name="question1" value="13">
      <label for="q1b">13</label><br>

      <input type="radio" id="q1c" name="question1" value="15">
      <label for="q1c">15</label><br><br>

      <h3>2. Which symbol represents "less than"?</h3>
      <input type="radio" id="q2a" name="question2" value=">">
      <label for="q2a">&gt;</label><br>

      <input type="radio" id="q2b" name="question2" value="<">
      <label for="q2b">%lt;</label><br>

      <input type="radio" id="q2c" name="question2" value="=">
      <label for="q2c">&equals;</label><br><br>

      <h3>3. What is 6 &times; 4?</h3>
      <input type="radio" id="q3a" name="question3" value="24">
      <label for="q3a">24</label><br>

      <input type="radio" id="q3b" name="question3" value="20">
      <label for="q3b">20</label><br>

      <input type="radio" id="q3c" name="question3" value="30">
      <label for="q3c">30</label><br><br>

      <h3>4. Word Problem</h3>
      <p>
        Sarah has 12 apples. She gives 5 apples to her friend and buys 3 more apples. How many apples does Sarah have now?
      </p>

      <textarea id="wordProblem" name="wordProblem" rows="5" cols="40">
      </textarea>
      <br><br>

      <input type="submit" value="Submit Test">
    </form>

    <!-- End of the Math Test -->

  </body>
</html>
